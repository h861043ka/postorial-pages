<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141420"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </linearGradient>
    <linearGradient id="wing" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c30"/>
      <stop offset="50%" style="stop-color:#111120"/>
      <stop offset="100%" style="stop-color:#08080f"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="80%">
      <stop offset="0%" style="stop-color:#354880;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#141420;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- ===== 左翼（大きく広げた翼） ===== -->
  <path d="M 245 255
           C 220 235, 175 195, 125 155
           C 100 138, 70 120, 42 115
           C 30 112, 22 118, 30 128
           C 40 142, 58 155, 80 168
           C 55 162, 35 158, 20 162
           C 12 165, 15 172, 25 175
           C 45 180, 75 188, 100 198
           C 130 212, 175 235, 220 258
           Z"
        fill="url(#wing)"/>
  <!-- 左翼の光沢 -->
  <path d="M 230 248
           C 200 228, 160 200, 120 170
           C 100 155, 78 142, 60 135
           C 80 148, 110 165, 140 185
           C 175 208, 210 235, 235 252
           Z"
        fill="url(#sheen)"/>

  <!-- ===== 右翼 ===== -->
  <path d="M 295 255
           C 320 230, 365 185, 415 150
           C 435 138, 460 125, 480 122
           C 492 120, 498 128, 490 136
           C 478 148, 460 158, 440 168
           C 462 164, 480 162, 495 168
           C 502 172, 498 178, 488 180
           C 468 184, 440 192, 418 202
           C 385 218, 345 240, 310 260
           Z"
        fill="url(#wing)"/>
  <!-- 右翼の光沢 -->
  <path d="M 300 252
           C 328 232, 368 200, 410 172
           C 430 160, 452 148, 468 142
           C 448 152, 425 165, 400 180
           C 365 205, 328 232, 300 255
           Z"
        fill="url(#sheen)"/>

  <!-- ===== 胴体 ===== -->
  <ellipse cx="270" cy="290" rx="62" ry="55" fill="url(#bg)"/>
  <!-- 胴体の光沢 -->
  <path d="M 235 265
           C 245 252, 265 245, 285 248
           C 300 250, 310 260, 312 272
           C 298 258, 278 252, 258 255
           C 245 258, 237 262, 235 265
           Z"
        fill="url(#sheen)"/>

  <!-- ===== 頭部（カラスらしい丸い頭） ===== -->
  <circle cx="240" cy="248" r="45" fill="url(#bg)"/>
  <!-- 額の盛り上がり（カラス特有） -->
  <path d="M 210 228
           C 215 215, 235 205, 255 208
           C 270 210, 278 220, 278 232
           C 270 218, 255 212, 240 212
           C 225 212, 215 218, 210 228
           Z"
        fill="url(#sheen)"/>

  <!-- ===== くちばし（太くてカラスらしい） ===== -->
  <path d="M 198 242
           L 130 232
           C 125 231, 122 234, 125 237
           L 198 252
           Z"
        fill="#1c1c30"/>
  <path d="M 198 252
           L 125 237
           C 122 238, 122 242, 126 244
           L 198 258
           Z"
        fill="#0f0f1a"/>
  <!-- くちばしのハイライト -->
  <path d="M 195 244
           L 145 236
           L 148 240
           L 195 248
           Z"
        fill="#252540" opacity="0.5"/>

  <!-- ===== 目（鋭い青い目） ===== -->
  <ellipse cx="222" cy="240" rx="11" ry="10" fill="#1d9bf0"/>
  <ellipse cx="222" cy="240" rx="7" ry="7" fill="#0a0a12"/>
  <!-- 目のハイライト -->
  <circle cx="219" cy="237" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="225" cy="243" r="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- ===== 尾羽（くさび形に広がる） ===== -->
  <path d="M 320 310
           C 350 325, 390 345, 420 370
           C 435 382, 445 395, 440 400
           C 430 398, 410 385, 385 370
           C 360 355, 335 338, 315 322
           Z"
        fill="#111120"/>
  <path d="M 325 320
           C 358 340, 400 365, 435 395
           C 448 408, 455 420, 448 422
           C 438 418, 418 400, 395 382
           C 365 360, 340 340, 320 328
           Z"
        fill="#0a0a12"/>
  <path d="M 318 328
           C 348 348, 385 378, 415 410
           C 425 422, 432 435, 425 438
           C 418 432, 405 418, 388 400
           C 362 375, 338 352, 315 335
           Z"
        fill="#111120" opacity="0.8"/>
</svg>
