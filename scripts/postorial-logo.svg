<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景: インディゴ→ディープパープル -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#2d1052"/>
    </linearGradient>
    <!-- アクセント: シアン→マゼンタ -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ff2d78"/>
    </linearGradient>
    <!-- 内側アーチのグラデーション -->
    <linearGradient id="accent2" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" style="stop-color:#00b4e6"/>
      <stop offset="100%" style="stop-color:#d946a8"/>
    </linearGradient>
    <!-- 光沢 -->
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- ===== 「P」の縦棒（基盤） ===== -->
  <rect x="130" y="100" width="42" height="312" rx="21" fill="url(#accent)"/>
  <!-- 縦棒の光沢 -->
  <rect x="130" y="100" width="18" height="312" rx="9" fill="url(#glow)"/>

  <!-- ===== 多層アーチウェイ（P のループ＝ゲート） ===== -->

  <!-- 外側アーチ（最大） -->
  <path d="M 151 130
           C 151 130, 155 68, 280 68
           C 405 68, 405 186, 405 186
           C 405 300, 280 300, 280 300
           L 172 300
           L 172 262
           L 280 262
           C 280 262, 365 262, 365 186
           C 365 110, 280 106, 280 106
           C 180 106, 172 130, 151 130
           Z"
        fill="url(#accent)" opacity="0.3"/>

  <!-- 中間アーチ -->
  <path d="M 172 148
           C 172 148, 180 100, 285 100
           C 380 100, 382 190, 382 190
           C 382 278, 285 278, 285 278
           L 172 278
           L 172 244
           L 280 244
           C 280 244, 345 244, 345 190
           C 345 136, 280 136, 280 136
           C 200 136, 172 148, 172 148
           Z"
        fill="url(#accent2)" opacity="0.5"/>

  <!-- 内側アーチ（メイン・最も鮮やか） -->
  <path d="M 172 170
           C 172 170, 185 134, 285 134
           C 358 134, 360 194, 360 194
           C 360 256, 285 256, 285 256
           L 172 256
           L 172 222
           L 280 222
           C 280 222, 322 222, 322 194
           C 322 166, 280 166, 280 166
           C 210 166, 172 170, 172 170
           Z"
        fill="url(#accent)"/>

  <!-- アーチ内側の光沢 -->
  <path d="M 172 170
           C 185 156, 220 142, 285 142
           C 345 142, 352 175, 352 194
           C 352 178, 340 154, 285 154
           C 230 154, 195 162, 172 170
           Z"
        fill="url(#glow)"/>

  <!-- ===== 縦棒の足元のドット（アクセント） ===== -->
  <circle cx="151" cy="432" r="14" fill="url(#accent)"/>
  <circle cx="151" cy="432" r="6" fill="url(#glow)"/>
</svg>
